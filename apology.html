<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #ff6b9d, #ffa8a8, #d4a5d4, #a8d5ff);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
  position: relative;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%, 100% {
    opacity: 0.2;
    transform: scale(0.7);
  }
  50% {
    opacity: 1;
    transform: scale(1.3);
  }
}

#hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.heart {
  position: absolute;
  bottom: -40px;
  font-size: 20px;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(0.7);
    opacity: 0;
  }
  15% {
    opacity: 1;
  }
  100% {
    transform: translateY(-110vh) rotate(360deg) scale(1.5);
    opacity: 0;
  }
}

.card {
  width: 90%;
  max-width: 700px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(18px);
  border-radius: 30px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.4);
  z-index: 5;
  position: relative;
  max-height: 90vh;
  overflow-y: auto;
}

.card img {
  width: 280px;
  max-width: 100%;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

h1 {
  font-size: 48px;
  color: white;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 22px;
  color: white;
  margin-bottom: 25px;
}

#letter {
  font-size: 18px;
  color: white;
  line-height: 1.8;
  min-height: 280px;
  margin-bottom: 25px;
  text-align: left;
}

button {
  padding: 14px 32px;
  font-size: 20px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
  margin: 10px;
  font-weight: bold;
}

#start {
  background: #ffffff;
  color: #ff6b9d;
}

#start:hover {
  transform: scale(1.08);
}

#question {
  display: none;
}

#accept {
  background: #ff6b9d;
  color: white;
  box-shadow: 0 0 20px #ff6b9d;
}

#accept:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #ff6b9d;
}

#maybe {
  background: #ffa8a8;
  color: white;
  position: relative;
}

#message {
  margin-top: 30px;
  font-size: 24px;
  font-weight: bold;
  color: white;
  min-height: 60px;
}

canvas {
  position: fixed;
  left: 0;
  top: 0;
  pointer-events: none;
}

@media(max-width: 700px) {
  h1 { font-size: 34px; }
  .subtitle { font-size: 18px; }
  #letter { font-size: 16px; }
  button { font-size: 18px; padding: 12px 24px; }
  .card { padding: 25px; }
  .card img { width: 220px; }
}

@keyframes confettiFall {
  from {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}

@keyframes petalFall {
  from {
    transform: translateY(0) rotate(0deg);
  }
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

</style>
</head>
<body>

<div id="stars"></div>
<div id="hearts"></div>

<canvas id="fireworks"></canvas>

<div class="card">
  <img src="m%2Bl.png" alt="I miss you">
  
  <h1>I'm Sorry 💔</h1>
  
  <div class="subtitle">I need to talk to you about something...</div>
  
  <div id="letter"></div>
  
  <button id="start">💌 Read My Message</button>
  
  <div id="question">
    <h2 style="color:white;margin-bottom:20px;">Can you forgive me? 😔</h2>
    <button id="accept">I Forgive You 💕</button>
    <button id="maybe">I Need Time 💭</button>
  </div>
  
  <div id="message"></div>
</div>

<script>

const startButton = document.getElementById("start");
const question = document.getElementById("question");
const letter = document.getElementById("letter");
const acceptButton = document.getElementById("accept");
const maybeButton = document.getElementById("maybe");
const message = document.getElementById("message");

const loveText = `I'm really sorry for constantly disappointing you and betraying your trust. You are right, actions matter more than words. For that reason, I'll do my best to prove to you I'm sorry and that I can change.

Of course I don't expect you to just accept me back, but I'm willing to put in the effort for you. I genuinely do love you more than I can say, and I would hate to watch you slip away from me.

Of course my words can't make up for my actions, but I'll do my best to make sure my actions from now on prove my love for you.`;

let index = 0;

function typeLetter(){
  if(index < loveText.length){
    letter.innerHTML += loveText.charAt(index);
    index++;
    setTimeout(typeLetter, 45);
  }
}

// Create stars
const stars = document.getElementById("stars");

for(let i = 0; i < 120; i++){
  let star = document.createElement("div");
  star.className = "star";
  let size = Math.random() * 4 + 1;
  star.style.width = size + "px";
  star.style.height = size + "px";
  star.style.left = Math.random() * 100 + "%";
  star.style.top = Math.random() * 100 + "%";
  star.style.animationDelay = Math.random() * 3 + "s";
  stars.appendChild(star);
}

// Floating hearts
function createHeart(){
  let heart = document.createElement("div");
  heart.className = "heart";
  const hearts = ["💔", "💕", "💖", "💜", "❤️"];
  heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 30) + "px";
  heart.style.animationDuration = (4 + Math.random() * 5) + "s";
  document.getElementById("hearts").appendChild(heart);
  
  setTimeout(() => {
    heart.remove();
  }, 9000);
}

setInterval(createHeart, 400);

// Open letter
startButton.addEventListener("click", () => {
  startButton.style.display = "none";
  typeLetter();
  setTimeout(() => {
    question.style.display = "block";
  }, loveText.length * 45 + 500);
});

// Maybe button behavior
let maybeCount = 0;

maybeButton.addEventListener("mouseover", () => {
  maybeCount++;
  maybeButton.style.position = "fixed";
  maybeButton.style.left = Math.random() * (window.innerWidth - 120) + "px";
  maybeButton.style.top = Math.random() * (window.innerHeight - 60) + "px";

  const messages = [
    "I Need Time 💭",
    "Really? 🥺",
    "Just hear me out 😢",
    "Please? 💕",
    "I promise I'll do better 😔"
  ];

  maybeButton.innerHTML = messages[Math.min(maybeCount, messages.length - 1)];
});

// Accept button
acceptButton.addEventListener("click", () => {
  question.style.display = "none";
  message.innerHTML = "💕 THANK YOU FOR GIVING ME ANOTHER CHANCE 💕<br><br>I will never take that for granted...";
  startFireworks();
});

// ===============================
// FIREWORKS + CONFETTI
// ===============================

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];

class FireworkParticle {
  constructor(x, y, color){
    this.x = x;
    this.y = y;
    this.color = color;
    this.size = Math.random() * 4 + 2;
    this.speedX = (Math.random() - 0.5) * 10;
    this.speedY = (Math.random() - 0.5) * 10;
    this.gravity = 0.05;
    this.alpha = 1;
  }

  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    this.speedY += this.gravity;
    this.alpha -= 0.015;
  }

  draw(){
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

function createExplosion(){
  let x = Math.random() * canvas.width;
  let y = Math.random() * (canvas.height * 0.55);

  let colors = ["#ff6b9d", "#ffa8a8", "#d4a5d4", "#a8d5ff", "#ffffff"];
  let color = colors[Math.floor(Math.random() * colors.length)];

  for(let i = 0; i < 120; i++){
    particles.push(new FireworkParticle(x, y, color));
  }
}

function animateFireworks(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for(let i = particles.length - 1; i >= 0; i--){
    particles[i].update();
    particles[i].draw();

    if(particles[i].alpha <= 0){
      particles.splice(i, 1);
    }
  }

  requestAnimationFrame(animateFireworks);
}

animateFireworks();

function startFireworks(){
  document.body.style.background = "linear-gradient(135deg, #ff6b9d, #ffa8a8)";
  createExplosion();

  let fireworks = setInterval(() => {
    createExplosion();
  }, 800);

  setTimeout(() => {
    clearInterval(fireworks);
    finalMessage();
  }, 8000);
}

// CONFETTI
function createConfetti(){
  let confetti = document.createElement("div");
  confetti.innerHTML = "✨";
  confetti.style.position = "fixed";
  confetti.style.top = "-20px";
  confetti.style.left = Math.random() * 100 + "vw";
  confetti.style.fontSize = (15 + Math.random() * 25) + "px";
  confetti.style.animation = "confettiFall 4s linear forwards";
  document.body.appendChild(confetti);

  setTimeout(() => {
    confetti.remove();
  }, 4000);
}

setInterval(createConfetti, 150);

// ROSE PETALS
function createPetal(){
  let petal = document.createElement("div");
  petal.innerHTML = "🌹";
  petal.style.position = "fixed";
  petal.style.top = "-40px";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.fontSize = (18 + Math.random() * 20) + "px";
  petal.style.animation = "petalFall 6s linear forwards";
  document.body.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 6000);
}

setInterval(createPetal, 600);

// FINAL SCREEN
function finalMessage(){
  message.innerHTML = `
    💕 THANK YOU 💕
    <br><br>
    I promise to be better.
    <br><br>
    I will work hard to earn back your trust
    and show you how much you truly mean to me.
    <br><br>
    Forever grateful for your forgiveness ❤️
  `;
  message.style.fontSize = "24px";
}

// EASTER EGGS
let secretCode = "";

document.addEventListener("keydown", (event) => {
  secretCode += event.key.toLowerCase();

  if(secretCode.length > 12){
    secretCode = secretCode.slice(-12);
  }

  if(secretCode === "iloveyouagain"){
    message.innerHTML = `
      💖 PROMISE UNLOCKED 💖
      <br><br>
      I promise to be honest, kind, and true to you 💕
    `;
    document.body.style.background = "linear-gradient(135deg, #ff6b9d, #d4a5d4)";
    for(let i = 0; i < 20; i++){
      createHeart();
    }
  }

  if(event.key.toLowerCase() === "v"){
    createExplosion();
    createExplosion();
  }

  if(event.key.toLowerCase() === "l"){
    for(let i = 0; i < 15; i++){
      createHeart();
    }
  }
});

// Final signature
setTimeout(() => {
  let footer = document.createElement("div");
  footer.innerHTML = "Made with sincere apologies 💔";
  footer.style.position = "fixed";
  footer.style.bottom = "15px";
  footer.style.width = "100%";
  footer.style.textAlign = "center";
  footer.style.color = "white";
  footer.style.fontSize = "14px";
  footer.style.opacity = "0.8";
  footer.style.zIndex = "10";
  document.body.appendChild(footer);
}, 2000);

</script>
</body>
</html>
